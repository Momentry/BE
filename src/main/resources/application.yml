# application.yml profile 설정
# default(local 실행 시 프로필 미지정)에서도 common 설정(jwt, db 등) 로드
spring:
  profiles:
    group:
      default:
        - common
      local:
        - common
      prod:
        - common

---
spring:
  servlet:
    multipart:
      max-file-size: 20MB # 개별 파일당 최대 크기
      max-request-size: 100MB # 한 요청당 합계 최대 크기
  config:
    activate:
      on-profile: common
    import:
      - optional:file:.env[.properties]
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/momentry?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: false

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ${AWS_S3_REGION:ap-northeast-2}
      s3:
        bucket: ${AWS_S3_BUCKET}
      sqs:
        listener:
          acknowledgement-mode: ON_SUCCESS

server:
  port: 8080
  url:
    front: ${FRONT_URL:http://localhost:8081}

jwt:
  secret-key: ${JWT_SECRET:default-secret}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

cookie:
  name:
    refresh: refreshToken

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:accounts.google.com}
    issuer: accounts.google.com

cloudfront:
  enabled: ${CF_ENABLED:false}
  secret-key: ${CF_SECRET_KEY:}
  cookie-domain: ${CF_COOKIE_DOMAIN:d2y231bsfj38ut.cloudfront.net}
  cookie-path: ${CF_COOKIE_PATH:/}
  cookie-ttl-seconds: ${CF_COOKIE_TTL:3600}
  secure: ${CF_COOKIE_SECURE:true}
  http-only: ${CF_COOKIE_HTTP_ONLY:true}
  same-site: ${CF_COOKIE_SAME_SITE:None}
  url-prefix: ${CF_URL_PREFIX:https://d2y231bsfj38ut.cloudfront.net/album/}
  # public/*: 기본/공용 리소스 (서명 X) — CloudFront 콘솔에서 behavior 추가 시 사용
  public-url-prefix: ${CF_PUBLIC_URL_PREFIX:https://d2y231bsfj38ut.cloudfront.net/public/}
  # 기본 앨범 커버 파일명 (S3 public/default-album-cover-img.jpeg → public-url-prefix + 이 값)
  default-cover-filename: ${CF_DEFAULT_COVER_FILENAME:default-album-cover-img.jpeg}

aws:
  sqs:
    queue-name: ${AWS_SQS_FILE_PROCESSED_QUEUE}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:src/main/resources/serviceAccountKey.json}

---
spring:
  config:
    activate:
      on-profile: prod

# 커스텀 값
app:
  s3:
    upload-prefix: original/
    cover-image-folder: cover-image/

---
spring:
  config:
    activate:
      on-profile: local

# 커스텀 값
app:
  s3:
    upload-prefix: test-original/
